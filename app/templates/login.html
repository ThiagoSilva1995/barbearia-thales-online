{% extends "base.html" %}
{% block title %}Login do Sistema{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="max-w-md w-full bg-white rounded-xl shadow-2xl p-8 border-t-4 border-blue-600">
        <div class="text-center mb-8">
            <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user-shield text-blue-600 text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">Acesso Restrito</h2>
            <p class="text-sm text-gray-500 mt-2">Gestão de Barbearia</p>
        </div>

        {% if erro %}
        <div
            class="mb-6 p-3 bg-red-100 text-red-700 rounded-lg border border-red-200 text-sm text-center flex items-center justify-center gap-2">
            <i class="fas fa-exclamation-circle"></i> {{ erro }}
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Senha de Acesso</label>
                <input type="password" name="senha" required placeholder="Digite sua senha"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-center text-lg">
                <p class="text-xs text-gray-400 mt-2 text-center">
                    Use a senha de <strong>Admin</strong> ou <strong>Recepção</strong>.
                </p>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-lg transform hover:scale-[1.02]">
                Entrar no Sistema
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
            <a href="/cliente"
                class="text-sm text-gray-500 hover:text-blue-600 transition flex items-center justify-center gap-2">
                <i class="fas fa-user-circle"></i> Sou Cliente (Agendar Horário)
            </a>
        </div>
    </div>
</div>
{% endblock %}
