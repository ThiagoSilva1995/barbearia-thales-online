<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Barbearia do Thales{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
        }

        .card-modern {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            font-weight: 600;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: transform 0.1s;
            box-shadow: 0 4px 14px 0 rgba(37, 99, 235, 0.39);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .input-modern {
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .input-modern:focus {
            background: white;
            border-color: #2563eb;
            outline: none;
            ring: 2px;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col text-slate-800">

    <!-- Header Fixo Compacto (Modificado) -->
    <header class="glass-header sticky top-0 z-50 px-4 py-2.5 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-2.5">
            <!-- Ícone menor -->
            <div
                class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-sm font-bold shadow-md flex-shrink-0">
                💈
            </div>
            <div class="leading-tight">
                <h1 class="text-sm font-bold text-slate-900">Barbearia do Thales</h1>
                <p class="text-[10px] text-slate-500 font-medium uppercase tracking-wide">Agendamento Online</p>
            </div>
        </div>
        {% if cliente_logado %}
        <a href="/cliente/sair"
            class="w-7 h-7 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-red-50 hover:text-red-500 transition ml-2">
            <i class="fas fa-sign-out-alt text-xs"></i>
        </a>
        {% endif %}
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-grow w-full max-w-lg mx-auto p-4 pb-24">
        {% block content %}{% endblock %}
    </main>

    <!-- Rodapé Discreto -->
    <footer class="text-center py-6 text-xs text-slate-400">
        <p>&copy; 2026 Barbearia do Thales</p>
    </footer>

</body>

</html>
