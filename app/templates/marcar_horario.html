{% extends "base.html" %}

{% block title %}Novo Agendamento - Gestão de Barbearia{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">📅 Marcar Novo Horário</h1>

    <div class="bg-white p-6 rounded-lg shadow-md">
        <form action="/marcar-horario" method="POST" class="space-y-4">

            <!-- Cliente -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Cliente</label>
                <select name="cliente" required
                    class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                    <option value="">Selecione um cliente...</option>
                    {% for cliente in clientes %}
                    <option value="{{ cliente.id }}">{{ cliente.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Campo Oculto Fixo para o Dono (ID 1) -->
            <input type="hidden" name="barbeiro" value="1">

            <!-- Apenas visualização para o usuário -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">Barbeiro</label>
                <div class="w-full bg-gray-100 border border-gray-300 rounded-md p-2 text-gray-600">
                    <i class="fas fa-user-tie mr-2"></i> Dono (Fixo)
                </div>
                <p class="text-xs text-gray-500 mt-1">Os agendamentos são feitos exclusivamente com o proprietário.</p>
            </div>

            <!-- Data e Hora -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Data</label>
                    <input type="date" name="data" value="{{ data_inicial }}" min="{{ data_inicial }}" required
                        class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Hora</label>
                    <select name="hora" required
                        class="w-full border-gray-300 rounded-md shadow-sm p-2 border focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Selecione um horário...</option>
                        {% for hora in horarios_disponiveis %}
                        <option value="{{ hora }}">{{ hora }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Serviços (Cortes) -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Serviços</label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                    {% for servico in servicos %}
                    <label class="flex items-center space-x-2 p-2 border rounded hover:bg-gray-50 cursor-pointer">
                        <input type="checkbox" name="servico" value="{{ servico.id }}"
                            class="rounded text-blue-600 focus:ring-blue-500">
                        <span class="text-gray-700">{{ servico.nome }} - R$ {{ servico.preco }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <!-- Botão Enviar -->
            <div class="pt-4">
                <button type="submit"
                    class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 transition font-bold shadow-md">
                    Confirmar Agendamento
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
